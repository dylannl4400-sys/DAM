<p class="font-body-md text-body-md text-on-surface-variant text-center px-gutter">Your daily ritual for cognitive ease and restorative flow.</p>
</div>
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl border border-primary/10 shadow-sm p-inset-square">
<form action="#" class="space-y-stack-md" method="POST">
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-stack-sm" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant bg-surface-bright focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-outline/60 text-body-md" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-stack-sm" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-10 pr-12 py-3 rounded-lg border border-outline-variant bg-surface-bright focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-outline/60 text-body-md" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<div class="flex justify-end mt-base">
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot password?</a>
</div>
</div>
<div class="pt-base">
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-3 rounded-full shadow-md hover:opacity-90 active:scale-95 transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-stack-lg flex flex-col items-center gap-stack-md">
<div class="flex items-center w-full gap-stack-sm">
<div class="h-[1px] bg-outline-variant flex-grow"></div>
<span class="font-label-sm text-label-sm text-outline">OR</span>
<div class="h-[1px] bg-outline-variant flex-grow"></div>
</div>
<button class="w-full bg-surface-container-low text-on-surface font-label-lg text-label-lg py-3 rounded-full border border-outline-variant flex items-center justify-center gap-3 hover:bg-surface-container-high transition-colors">
