<div class="space-y-stack-md">

<div class="space-y-stack-md">
<label class="font-label-lg text-label-lg text-on-surface ml-1">Category Picker</label>
<div class="grid grid-cols-3 gap-stack-md">
<button class="flex flex-col items-center justify-center p-4 bg-primary-container text-on-primary-container rounded-xl border-2 border-primary transition-all scale-105 shadow-sm" type="button">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">exercise</span>
<span class="text-label-sm font-label-sm">Exercise</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-lowest text-on-surface-variant border-2 border-outline-variant rounded-xl hover:bg-surface-container-low transition-all" type="button">

</button>

<span class="text-label-sm font-label-sm">Mindful</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-lowest text-on-surface-variant border-2 border-outline-variant rounded-xl hover:bg-surface-container-low transition-all" type="button">
<span class="material-symbols-outlined mb-1">menu_book</span>
<span class="text-label-sm font-label-sm">Learning</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-lowest text-on-surface-variant border-2 border-outline-variant rounded-xl hover:bg-surface-container-low transition-all" type="button">
<span class="material-symbols-outlined mb-1">work</span>
<span class="text-label-sm font-label-sm">Focus</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-lowest text-on-surface-variant border-2 border-outline-variant rounded-xl hover:bg-surface-container-low transition-all" type="button">
<span class="material-symbols-outlined mb-1">more_horiz</span>
<span class="text-label-sm font-label-sm">Other</span>
</button>
</div>
</div>

<div class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant">

</div>
</div>
</div>
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl border border-outline-variant/30">

<div>
